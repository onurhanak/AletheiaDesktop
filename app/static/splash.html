<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #121212;
            overflow: hidden;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        .container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            background: var(--primary-color);
            height: 100vh;
            width: 100vw;
            animation: lift 0.8s ease-in-out;
            animation-delay: 1.6s;
            animation-fill-mode: forwards;
        }

        .title {
            font-size: 81px;
            color: #fff;
            text-align: center;
            font-family: "Lexend Deca", sans-serif;
            animation: wave 0.4s, jump 1s;
            position: relative;
            top: 0;
            padding: 4px;
            //transform: translate3d(0, 16%, 0);
            opacity: 0;
            z-index: 3;
            animation-fill-mode: forwards;
        }

        span:nth-of-type(1) {
            //left: 0rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.05s;
        }

        span:nth-of-type(2) {
            //left: 0.8rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.1s;
        }

        span:nth-of-type(3) {
            //left: 1.6rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.15s;
        }

        span:nth-of-type(4) {
            //left: 2.4rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.2s;
        }

        span:nth-of-type(5) {
            //left: 3.2rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.25s;
        }

        span:nth-of-type(6) {
            //left: 4rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.3s;
        }

        span:nth-of-type(7) {
            //left: 4.8rem;
            animation: wave 0.4s, jump 1.1s ease-in-out alternate 0.35s;
        }



        @keyframes wave {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        @keyframes jump {
            0% {
                transform: translate3d(0, 0, 0);
                opacity: 0;
            }

            90% {
                transform: translate3d(0, -16%, 0);
                opacity: 1;
            }

            100% {
                transform: translate3d(0, -32%, 0);
                opacity: 1;
            }
        }

        @keyframes lift {
            0% {
                transform: translate3d(0, 0, 0);
                opacity: 1;
                visibility: visible;
            }

            100% {
                transform: translate3d(0, -100%, 0);
                opacity: 1;
                visibility: hidden;
            }
        }

        @keyframes appear {
            0% {
                visibility: hidden;
            }

            100% {
                visibility: visible;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <span class="title">ἀ</span>
        <span class="title">λ</span>
        <span class="title">ή</span>
        <span class="title">θ</span>
        <span class="title">ε</span>
        <span class="title">ι</span>
        <span class="title">α</span>
    </div>

    <script>
        setTimeout(function () {
            window.location.href = "index.html";
        }, 2000); 
    </script>
</body>

</html>
